name: GitHub Pages'e Quartz portföyünü yayınla

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Bağımlılıkları yükle
        run: npm ci
      - name: Quartz eklentilerini yükle
        run: npx quartz plugin install
      - name: Siteyi oluştur
        run: npx quartz build
      - name: Yayın çıktısını yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages'e yayınla
        id: deployment
        uses: actions/deploy-pages@v4
